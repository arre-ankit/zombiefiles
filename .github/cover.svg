  </text>

  <text x="268" y="506" font-family="monospace" font-size="18">
    <tspan fill="#e5e7eb">utils/temp.ts</tspan>
    <tspan fill="#6b7280"> — untouched for 10 months</tspan>
  </text>

  <text x="268" y="534" font-family="monospace" font-size="18">
