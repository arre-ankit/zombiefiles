  <circle cx="290" cy="394" r="6" fill="#febc2e"/>
  <circle cx="312" cy="394" r="6" fill="#28c840"/>

  <!-- Terminal content -->
  <text x="268" y="440" font-family="monospace" font-size="18" fill="#9ca3af">$<tspan fill="#4ade80"> npx zombiefiles</tspan></text>

  <text x="268" y="478" font-family="monospace" font-size="18">
